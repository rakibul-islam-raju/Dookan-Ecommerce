version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ecommerce_backend
    restart: unless-stopped
    init: true
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      CACHE_DIR: ${CACHE_DIR:-/tmp/django-cache}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.50
    pids_limit: 256
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ecommerce_celery_worker
    restart: unless-stopped
    init: true
    command: >
      uv run celery -A core worker
      --loglevel=${CELERY_LOG_LEVEL:-info}
      --concurrency=${CELERY_CONCURRENCY:-2}
    env_file:
      - .env
    environment:
      CACHE_DIR: ${CACHE_DIR:-/tmp/django-cache}
      COLLECT_STATIC: "0"
      RUN_MIGRATIONS: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 1.00
    pids_limit: 256

  db:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 1.00
    pids_limit: 256

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.50
    pids_limit: 128

  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.50
    pids_limit: 128

volumes:
  postgres_data:
  static_volume:
  media_volume:
