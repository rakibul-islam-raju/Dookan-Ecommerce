x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile.prod

x-backend-env: &backend-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-compose-dev-secret-change-before-production-1234567890}
  DEBUG: ${DJANGO_DEBUG:-True}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api,backend,0.0.0.0}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
  ADMIN_URL: ${ADMIN_URL:-http://localhost:5173}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  POSTGRES_DB: ${POSTGRES_DB:-ecom}
  POSTGRES_USER: ${POSTGRES_USER:-ecom_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecom_password}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
  CACHE_DIR: /tmp/django-cache
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-False}
  CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-False}
  USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-False}
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
  CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
  SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
  SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-False}
  SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-False}
  COLLECT_STATIC: ${COLLECT_STATIC:-1}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
  GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
  GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
services:
  db:
    image: postgres:16-alpine
    container_name: dookan_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecom}
      POSTGRES_USER: ${POSTGRES_USER:-ecom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecom_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: dookan_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: *backend-build
    image: dookan-backend:local
    container_name: dookan_api
    restart: unless-stopped
    init: true
    environment: *backend-env
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  celery_worker:
    build: *backend-build
    image: dookan-backend:local
    container_name: dookan_celery_worker
    restart: unless-stopped
    init: true
    command: >
      uv run celery -A core worker
      --loglevel=${CELERY_LOG_LEVEL:-info}
      --concurrency=${CELERY_CONCURRENCY:-2}
    environment:
      <<: *backend-env
      COLLECT_STATIC: "0"
      RUN_MIGRATIONS: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_BASE_APP_URL: ${NEXT_PUBLIC_BASE_APP_URL:-http://localhost:8000}
        NEXT_PUBLIC_AUTH_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_COOKIE_NAME:-access_token}
        NEXT_PUBLIC_REFRESH_COOKIE_NAME: ${NEXT_PUBLIC_REFRESH_COOKIE_NAME:-refresh_token}
        NEXT_PUBLIC_COOKIE_SECURE: ${NEXT_PUBLIC_COOKIE_SECURE:-false}
        NEXT_PUBLIC_IMAGE_DOMAIN: ${NEXT_PUBLIC_IMAGE_DOMAIN:-}
        API_INTERNAL_URL: ${BUILD_API_INTERNAL_URL:-http://localhost:8000/api/v1}
        REVALIDATE_PRODUCTS: ${REVALIDATE_PRODUCTS:-7200}
        REVALIDATE_CATEGORIES: ${REVALIDATE_CATEGORIES:-7200}
        REVALIDATE_SECRET: ${REVALIDATE_SECRET:-change-me}
        REVALIDATE_ALLOWED_ORIGINS: ${REVALIDATE_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
        ON_HTTPS: ${ON_HTTPS:-false}
    image: dookan-frontend:local
    container_name: dookan_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_BASE_APP_URL: ${NEXT_PUBLIC_BASE_APP_URL:-http://localhost:8000}
      NEXT_PUBLIC_AUTH_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_COOKIE_NAME:-access_token}
      NEXT_PUBLIC_REFRESH_COOKIE_NAME: ${NEXT_PUBLIC_REFRESH_COOKIE_NAME:-refresh_token}
      NEXT_PUBLIC_COOKIE_SECURE: ${NEXT_PUBLIC_COOKIE_SECURE:-false}
      NEXT_PUBLIC_IMAGE_DOMAIN: ${NEXT_PUBLIC_IMAGE_DOMAIN:-}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000/api/v1}
      REVALIDATE_PRODUCTS: ${REVALIDATE_PRODUCTS:-7200}
      REVALIDATE_CATEGORIES: ${REVALIDATE_CATEGORIES:-7200}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-change-me}
      REVALIDATE_ALLOWED_ORIGINS: ${REVALIDATE_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      ON_HTTPS: ${ON_HTTPS:-false}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_STOREFRONT_REVALIDATE_URL: ${VITE_STOREFRONT_REVALIDATE_URL:-http://localhost:3000/api/revalidate}
        VITE_STOREFRONT_REVALIDATE_SECRET: ${VITE_STOREFRONT_REVALIDATE_SECRET:-change-me}
    image: dookan-admin:local
    container_name: dookan_admin
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_STOREFRONT_REVALIDATE_URL: ${VITE_STOREFRONT_REVALIDATE_URL:-http://localhost:3000/api/revalidate}
      VITE_STOREFRONT_REVALIDATE_SECRET: ${VITE_STOREFRONT_REVALIDATE_SECRET:-change-me}
    ports:
      - "${ADMIN_HOST_PORT:-5173}:4173"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  db_data:
  backend_static:
  backend_media:
